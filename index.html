<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>بوستك — لوحة التحكم</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#080810;color:#f0f0f8;font-family:'Cairo',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#0f0f1a;border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:48px 36px;width:100%;max-width:380px;display:flex;flex-direction:column;align-items:center;gap:24px;box-shadow:0 0 60px rgba(45,212,191,0.06)}
.logo{font-size:28px;font-weight:900;color:#2dd4bf;letter-spacing:-1px}
.logo span{color:rgba(240,240,248,0.3);font-size:13px;font-weight:400;margin-right:8px}
.title{font-size:18px;font-weight:700}
.sub{font-size:13px;color:rgba(240,240,248,0.4);text-align:center}
#step-login{width:100%;display:flex;flex-direction:column;gap:16px}
.google-btn{display:flex;align-items:center;justify-content:center;gap:10px;background:#fff;color:#1a1a2e;padding:13px 24px;border-radius:12px;border:none;cursor:pointer;font-size:15px;font-family:'Cairo',sans-serif;font-weight:700;width:100%;transition:all .2s}
.google-btn:hover{background:#f0f0f0;transform:translateY(-1px)}
.google-btn svg{width:20px;height:20px;flex-shrink:0}
#login-error{font-size:12px;color:#f87171;text-align:center;display:none}
#step-choose{width:100%;display:none;flex-direction:column;gap:12px}
.cms-option{display:flex;align-items:center;gap:14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:18px 20px;cursor:pointer;transition:all .2s;text-decoration:none;color:#f0f0f8}
.cms-option:hover{border-color:#2dd4bf;background:rgba(45,212,191,0.06);transform:translateX(-4px)}
.cms-option-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.app-icon{background:rgba(45,212,191,0.1);border:1px solid rgba(45,212,191,0.2)}
.site-icon{background:rgba(167,139,250,0.1);border:1px solid rgba(167,139,250,0.2)}
.cms-option-title{font-size:15px;font-weight:700}
.cms-option-desc{font-size:12px;color:rgba(240,240,248,0.4);margin-top:2px}
.cms-option-arrow{margin-right:auto;color:rgba(240,240,248,0.2);font-size:18px;transition:all .2s}
.cms-option:hover .cms-option-arrow{color:#2dd4bf;transform:translateX(-4px)}
.signout-link{font-size:12px;color:rgba(240,240,248,0.3);cursor:pointer;text-align:center;transition:color .2s}
.signout-link:hover{color:#f87171}
</style>
</head>
<body>
<div class="card">
  <div class="logo">بوستك <span>CMS</span></div>
  <div class="title" id="card-title">لوحة التحكم</div>
  <div class="sub" id="card-sub">للدخول المصرح به فقط</div>
  <div id="step-login">
    <button class="google-btn" onclick="doSignIn()">
      <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      الدخول بـ Google
    </button>
    <div id="login-error">❌ غير مصرح لك بالدخول</div>
  </div>
  <div id="step-choose">
    <a href="cms-app.html" class="cms-option">
      <div class="cms-option-icon app-icon">⚙️</div>
      <div><div class="cms-option-title">CMS التطبيق</div><div class="cms-option-desc">التامبلت، المستخدمين، الإعدادات</div></div>
      <div class="cms-option-arrow">←</div>
    </a>
    <a href="cms-site.html" class="cms-option">
      <div class="cms-option-icon site-icon">🌐</div>
      <div><div class="cms-option-title">CMS الموقع</div><div class="cms-option-desc">الفيديوات، الصفحات، محتوى الموقع</div></div>
      <div class="cms-option-arrow">←</div>
    </a>
    <div class="signout-link" onclick="doSignOut()">تسجيل الخروج</div>
  </div>
</div>
<script>
const ADMIN_EMAIL = 'zoubidy88@gmail.com';
firebase.initializeApp({apiKey:"AIzaSyDqooWDkG_XIAI-cTGhLSLmH1UM8xwiFGw",authDomain:"postak-c40e2.firebaseapp.com",projectId:"postak-c40e2",storageBucket:"postak-c40e2.firebasestorage.app",messagingSenderId:"932521380217",appId:"1:932521380217:web:85290565bca1287c2747a8"});
const auth = firebase.auth();
function doSignIn(){ auth.signInWithPopup(new firebase.auth.GoogleAuthProvider()).catch(e=>{ document.getElementById('login-error').style.display='block'; }); }
function doSignOut(){ auth.signOut(); }
auth.onAuthStateChanged(user=>{
  if(user){
    if(user.email !== ADMIN_EMAIL){ document.getElementById('login-error').style.display='block'; auth.signOut(); return; }
    document.getElementById('step-login').style.display='none';
    document.getElementById('step-choose').style.display='flex';
    document.getElementById('card-title').textContent='أهلاً، '+(user.displayName?.split(' ')[0]||'سرمد');
    document.getElementById('card-sub').textContent='اختر لوحة التحكم';
  } else {
    document.getElementById('step-login').style.display='flex';
    document.getElementById('step-choose').style.display='none';
    document.getElementById('card-title').textContent='لوحة التحكم';
    document.getElementById('card-sub').textContent='للدخول المصرح به فقط';
  }
});
</script>
</body>
</html>
